services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: goride
      POSTGRES_USER: goride
      POSTGRES_PASSWORD: goride
    ports:
      - "5432:5432"
    volumes:
      - goride_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U goride -d goride"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  goride_pg_data:
